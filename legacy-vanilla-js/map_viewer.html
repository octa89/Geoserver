<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSM GIS - Map Viewer</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 100vh; }

        /* ---- Sidebar ---- */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: #1a1a2e;
            color: #eee;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }
        #sidebar.collapsed { transform: translateX(-320px); }

        #sidebar-toggle {
            position: absolute;
            top: 12px;
            left: 320px;
            z-index: 1001;
            background: #1a1a2e;
            color: #eee;
            border: none;
            border-radius: 0 6px 6px 0;
            padding: 10px 8px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.3);
            transition: left 0.3s ease;
        }
        #sidebar.collapsed + #sidebar-toggle { left: 0; }

        .sidebar-header {
            padding: 16px 18px;
            background: #16213e;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #0f3460;
        }

        .sidebar-section {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-section h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8fa6;
            margin-bottom: 8px;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
        }

        /* Basemap buttons */
        .basemap-group { display: flex; gap: 6px; }
        .basemap-btn {
            flex: 1;
            padding: 6px 4px;
            background: #16213e;
            color: #ccc;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            transition: all 0.15s;
        }
        .basemap-btn.active {
            background: #0f3460;
            color: #fff;
            border-color: #e94560;
        }
        .basemap-btn:hover { background: #0f3460; }

        /* Layer checkboxes */
        .layer-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
        }
        .layer-item input[type="checkbox"] {
            margin-right: 8px;
            accent-color: #e94560;
        }
        .layer-item label { cursor: pointer; flex: 1; }
        .layer-item .layer-count {
            font-size: 10px;
            color: #7f8fa6;
            margin-left: 4px;
        }

        /* Layer symbol swatch */
        .layer-swatch {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .layer-swatch svg { display: block; }

        /* Symbology controls */
        .sym-select {
            width: 100%;
            padding: 6px 8px;
            margin-bottom: 8px;
            background: #16213e;
            color: #eee;
            border: 1px solid #0f3460;
            border-radius: 4px;
            font-size: 12px;
        }
        .sym-select:focus { outline: none; border-color: #e94560; }

        /* Legend */
        #legend-content { max-height: 200px; overflow-y: auto; }
        .legend-item {
            display: flex;
            align-items: center;
            padding: 2px 0;
            font-size: 12px;
        }
        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .legend-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Loading indicator */
        #loading-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(26,26,46,0.9);
            color: #eee;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #loading-indicator.show { display: block; }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content { margin: 0; min-width: 250px; max-width: 380px; }
        .popup-header {
            background: #1a1a2e;
            color: #fff;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 13px;
        }
        .popup-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .popup-table tr:nth-child(even) { background: #f5f6fa; }
        .popup-table td {
            padding: 5px 10px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }
        .popup-table td:first-child {
            font-weight: 600;
            color: #555;
            white-space: nowrap;
            width: 40%;
        }
        .popup-table td:last-child {
            word-break: break-word;
        }
        .popup-body { max-height: 280px; overflow-y: auto; }

        /* Custom point icon (remove Leaflet default background) */
        .custom-point-icon {
            background: none !important;
            border: none !important;
        }

        /* Style sub-controls (point shape, arrow toggle) */
        .style-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .style-row label {
            color: #aaa;
            white-space: nowrap;
            min-width: 55px;
        }
        .style-row select {
            flex: 1;
        }
        .style-row input[type="checkbox"] {
            accent-color: #e94560;
        }
        #sym-style-controls {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 8px;
            margin-top: 4px;
        }

        /* Status text */
        .status-text {
            font-size: 11px;
            color: #7f8fa6;
            padding: 4px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="sidebar">
        <div class="sidebar-header">POSM GIS Viewer</div>
        <div class="sidebar-scroll">
            <!-- Basemaps -->
            <div class="sidebar-section">
                <h4>Basemap</h4>
                <div class="basemap-group">
                    <button class="basemap-btn active" data-basemap="street">Street</button>
                    <button class="basemap-btn" data-basemap="satellite">Satellite</button>
                    <button class="basemap-btn" data-basemap="dark">Dark</button>
                </div>
            </div>

            <!-- Layers -->
            <div class="sidebar-section">
                <h4>Layers</h4>
                <div id="layer-list">
                    <div class="status-text">Loading layers from GeoServer...</div>
                </div>
            </div>

            <!-- Symbology -->
            <div class="sidebar-section">
                <h4>Symbology</h4>
                <select id="sym-layer" class="sym-select">
                    <option value="">Select a layer...</option>
                </select>
                <select id="sym-field" class="sym-select" disabled>
                    <option value="">Select a field...</option>
                </select>
                <!-- Point shape / Line arrows (shown per geometry type) -->
                <div id="sym-style-controls">
                    <div id="sym-point-row" class="style-row" style="display:none;">
                        <label>Symbol:</label>
                        <select id="sym-point-shape" class="sym-select" style="margin-bottom:0;">
                            <option value="circle">Circle</option>
                            <option value="square">Square</option>
                            <option value="triangle">Triangle</option>
                            <option value="diamond">Diamond</option>
                            <option value="star">Star</option>
                            <option value="cross">Cross / Plus</option>
                        </select>
                    </div>
                    <div id="sym-arrow-row" class="style-row" style="display:none;">
                        <label>Arrows:</label>
                        <input type="checkbox" id="sym-arrows"> <span style="color:#ccc;">Show arrowheads</span>
                    </div>
                </div>
                <button id="sym-reset" class="basemap-btn" style="width:100%; margin-top:4px;">Reset to Default Style</button>
            </div>

            <!-- Legend -->
            <div class="sidebar-section">
                <h4>Legend</h4>
                <div id="legend-content">
                    <div class="status-text">Apply symbology to see legend</div>
                </div>
            </div>
        </div>
    </div>
    <button id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>

    <div id="loading-indicator">Loading...</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Leaflet PolylineDecorator (arrowheads) -->
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

    <script>
    (function() {
        'use strict';

        // ---- CONFIGURATION ----
        const GEOSERVER_URL = '/geoserver';
        const WORKSPACE = 'POSM_GIS';
        const WFS_URL = `${GEOSERVER_URL}/${WORKSPACE}/wfs`;
        const WFS_CAPS_URL = `${WFS_URL}?service=WFS&version=1.1.0&request=GetCapabilities`;

        // ---- COLOR PALETTE (25 distinct colors) ----
        const COLOR_PALETTE = [
            '#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4',
            '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990',
            '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3',
            '#808000', '#ffd8b1', '#000075', '#a9a9a9', '#e6beff',
            '#1abc9c', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'
        ];

        // Default colors per layer (distinct from symbology palette — offset so they don't clash)
        const LAYER_COLORS = [
            '#3388ff', '#e6194b', '#3cb44b', '#f58231', '#911eb4',
            '#42d4f4', '#f032e6', '#469990', '#e74c3c', '#2ecc71',
            '#9b59b6', '#4363d8', '#bfef45', '#800000', '#808000',
            '#000075', '#9A6324', '#1abc9c', '#aaffc3', '#ffd8b1'
        ];

        // ---- STATE ----
        // layerData.X = { fullName, label, geojson, leafletLayer, clusterGroup, fields, geomType, color,
        //                  pointSymbol:'circle', showArrows:false, arrowDecorators:[], symbology:null }
        const layerData = {};
        let activeSymbology = null; // { layerName, field, valueColorMap }
        let layerIndex = 0;        // counter for assigning default colors

        // ---- BASEMAPS ----
        const basemaps = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri',
                maxZoom: 19
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                maxZoom: 19
            })
        };

        // ---- MAP INIT ----
        const map = L.map('map', {
            center: [41.897, -84.037],
            zoom: 14,
            layers: [basemaps.street]
        });

        let currentBasemap = 'street';

        // ---- BASEMAP SWITCHER ----
        document.querySelectorAll('.basemap-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.basemap;
                if (key === currentBasemap) return;
                map.removeLayer(basemaps[currentBasemap]);
                map.addLayer(basemaps[key]);
                currentBasemap = key;
                document.querySelectorAll('.basemap-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // ---- SIDEBAR TOGGLE ----
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        };

        // ---- LOADING INDICATOR ----
        let loadCount = 0;
        function showLoading(msg) {
            loadCount++;
            const el = document.getElementById('loading-indicator');
            el.textContent = msg || 'Loading...';
            el.classList.add('show');
        }
        function hideLoading() {
            loadCount--;
            if (loadCount <= 0) {
                loadCount = 0;
                document.getElementById('loading-indicator').classList.remove('show');
            }
        }

        // ---- DEFAULT STYLE ----
        function defaultStyle(geomType, color) {
            const c = color || '#3388ff';
            const border = darkenColor(c);
            if (geomType === 'Point' || geomType === 'MultiPoint') {
                return { radius: 6, fillColor: c, color: border, weight: 1.5, opacity: 1, fillOpacity: 0.7 };
            } else if (geomType === 'LineString' || geomType === 'MultiLineString') {
                return { color: c, weight: 3, opacity: 0.8 };
            } else {
                return { fillColor: c, color: border, weight: 2, opacity: 1, fillOpacity: 0.35 };
            }
        }

        // ---- SVG SWATCH for layer panel ----
        function createSwatchSVG(geomType, color, symbolType) {
            const c = color || '#3388ff';
            const border = darkenColor(c);
            if (geomType === 'Point' || geomType === 'MultiPoint') {
                // Use the actual point symbol shape
                return pointSVG(symbolType || 'circle', c, border, 18);
            } else if (geomType === 'LineString' || geomType === 'MultiLineString') {
                return `<svg width="20" height="14"><polyline points="0,11 8,3 20,11" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            } else {
                return `<svg width="18" height="16"><rect x="1" y="1" width="16" height="14" rx="2" fill="${c}" fill-opacity="0.5" stroke="${border}" stroke-width="1.5"/></svg>`;
            }
        }

        // ---- MULTI-COLOR SWATCH (when symbology applied) ----
        function createMultiSwatchSVG(geomType, colors) {
            const cols = colors.slice(0, 4);
            if (geomType === 'Point' || geomType === 'MultiPoint') {
                if (cols.length === 1) return createSwatchSVG(geomType, cols[0]);
                const parts = cols.map((c, i) => {
                    const angles = [
                        [0, -8], [8, 0], [0, 8], [-8, 0]
                    ];
                    const cx = 9 + (i < 2 ? (i === 0 ? -3 : 3) : (i === 2 ? 3 : -3));
                    const cy = 9 + (i < 2 ? -3 : 3);
                    return `<circle cx="${cx}" cy="${cy}" r="4" fill="${c}" stroke="${darkenColor(c)}" stroke-width="0.8"/>`;
                });
                return `<svg width="18" height="18">${parts.join('')}</svg>`;
            } else if (geomType === 'LineString' || geomType === 'MultiLineString') {
                const lines = cols.map((c, i) => {
                    const y = 2 + i * 3;
                    return `<line x1="0" y1="${y}" x2="20" y2="${y}" stroke="${c}" stroke-width="2" stroke-linecap="round"/>`;
                });
                return `<svg width="20" height="14">${lines.join('')}</svg>`;
            } else {
                const w = 16 / cols.length;
                const rects = cols.map((c, i) => {
                    return `<rect x="${1 + i * w}" y="1" width="${w}" height="14" fill="${c}" fill-opacity="0.6"/>`;
                });
                return `<svg width="18" height="16"><rect x="1" y="1" width="16" height="14" rx="2" fill="none" stroke="#555" stroke-width="1"/>${rects.join('')}</svg>`;
            }
        }

        // ---- DETECT GEOMETRY TYPE from GeoJSON ----
        function detectGeomType(geojson) {
            if (!geojson.features || geojson.features.length === 0) return 'Unknown';
            for (const f of geojson.features) {
                if (f.geometry && f.geometry.type) return f.geometry.type;
            }
            return 'Unknown';
        }

        // ---- EXTRACT ATTRIBUTE FIELDS from GeoJSON ----
        function extractFields(geojson) {
            const fieldSet = new Set();
            const sampleSize = Math.min(geojson.features.length, 50);
            for (let i = 0; i < sampleSize; i++) {
                const props = geojson.features[i].properties;
                if (props) Object.keys(props).forEach(k => fieldSet.add(k));
            }
            return Array.from(fieldSet).sort();
        }

        // ---- POINT MARKER CREATION ----
        function createPointMarker(latlng, symbolType, fillColor, borderColor, size) {
            size = size || 14;
            const half = size / 2;
            if (!symbolType || symbolType === 'circle') {
                return L.circleMarker(latlng, {
                    radius: half, fillColor: fillColor, color: borderColor,
                    weight: 1.5, opacity: 1, fillOpacity: 0.7
                });
            }
            const svg = pointSVG(symbolType, fillColor, borderColor, size);
            const icon = L.divIcon({
                html: svg,
                className: 'custom-point-icon',
                iconSize: [size, size],
                iconAnchor: [half, half]
            });
            return L.marker(latlng, { icon: icon });
        }

        function pointSVG(symbolType, fill, stroke, size) {
            const s = size, h = s / 2;
            switch (symbolType) {
                case 'square':
                    return `<svg width="${s}" height="${s}"><rect x="1" y="1" width="${s-2}" height="${s-2}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/></svg>`;
                case 'triangle':
                    return `<svg width="${s}" height="${s}"><polygon points="${h},1 ${s-1},${s-1} 1,${s-1}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/></svg>`;
                case 'diamond':
                    return `<svg width="${s}" height="${s}"><polygon points="${h},1 ${s-1},${h} ${h},${s-1} 1,${h}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/></svg>`;
                case 'star': {
                    const pts = [];
                    for (let i = 0; i < 5; i++) {
                        const aOuter = (i * 72 - 90) * Math.PI / 180;
                        const aInner = ((i * 72) + 36 - 90) * Math.PI / 180;
                        pts.push(`${h + (h-1)*Math.cos(aOuter)},${h + (h-1)*Math.sin(aOuter)}`);
                        pts.push(`${h + (h*0.4)*Math.cos(aInner)},${h + (h*0.4)*Math.sin(aInner)}`);
                    }
                    return `<svg width="${s}" height="${s}"><polygon points="${pts.join(' ')}" fill="${fill}" stroke="${stroke}" stroke-width="1"/></svg>`;
                }
                case 'cross': {
                    const t = s * 0.28;
                    return `<svg width="${s}" height="${s}"><rect x="${(s-t)/2}" y="1" width="${t}" height="${s-2}" rx="1" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/><rect x="1" y="${(s-t)/2}" width="${s-2}" height="${t}" rx="1" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/></svg>`;
                }
                default:
                    return `<svg width="${s}" height="${s}"><circle cx="${h}" cy="${h}" r="${h-1}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/></svg>`;
            }
        }

        // ---- CREATE LEAFLET LAYER FROM GEOJSON ----
        function createLeafletLayer(geojson, shortName, color, pointSymbol) {
            const geomType = detectGeomType(geojson);
            const isPoint = (geomType === 'Point' || geomType === 'MultiPoint');
            const sym = pointSymbol || 'circle';

            const geoJsonLayer = L.geoJSON(geojson, {
                pointToLayer: function(feature, latlng) {
                    return createPointMarker(latlng, sym, color || '#3388ff', darkenColor(color || '#3388ff'), 14);
                },
                style: function(feature) {
                    if (!isPoint) return defaultStyle(geomType, color);
                },
                onEachFeature: function(feature, layer) {
                    layer.on('click', function(e) {
                        const clickLatLng = e.latlng || (layer.getLatLng ? layer.getLatLng() : null);
                        if (clickLatLng) showPopup(feature, shortName, clickLatLng);
                    });
                }
            });

            // Use marker cluster for points
            if (isPoint && geojson.features.length > 200) {
                const cluster = L.markerClusterGroup({
                    maxClusterRadius: 50,
                    spiderfyOnMaxZoom: true,
                    showCoverageOnHover: false
                });
                cluster.addLayer(geoJsonLayer);
                return { leafletLayer: geoJsonLayer, clusterGroup: cluster, geomType: geomType };
            }

            return { leafletLayer: geoJsonLayer, clusterGroup: null, geomType: geomType };
        }

        // ---- POPUP ----
        function showPopup(feature, layerName, latlng) {
            const props = feature.properties || {};
            const info = layerData[layerName];
            const title = info ? info.label : layerName;

            let html = `<div class="popup-header">${escapeHtml(title)}</div><div class="popup-body"><table class="popup-table">`;
            const keys = Object.keys(props).sort();
            let hasContent = false;
            for (const k of keys) {
                const v = props[k];
                if (v === null || v === undefined || v === '') continue;
                hasContent = true;
                html += `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(String(v))}</td></tr>`;
            }
            if (!hasContent) {
                html += '<tr><td colspan="2" style="text-align:center;color:#999;">No attributes</td></tr>';
            }
            html += '</table></div>';

            L.popup({ maxWidth: 380, maxHeight: 350, className: '' })
                .setLatLng(latlng)
                .setContent(html)
                .openOn(map);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---- FETCH LAYERS VIA WFS GETCAPABILITIES ----
        async function discoverLayers() {
            showLoading('Discovering layers...');
            try {
                const resp = await fetch(WFS_CAPS_URL);
                const text = await resp.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');

                const featureTypes = xml.querySelectorAll('FeatureType');
                const layers = [];

                featureTypes.forEach(ft => {
                    const nameEl = ft.querySelector('Name');
                    const titleEl = ft.querySelector('Title');
                    if (!nameEl) return;

                    const rawName = nameEl.textContent;
                    const title = titleEl ? titleEl.textContent : rawName;
                    const shortName = rawName.includes(':') ? rawName.split(':')[1] : rawName;
                    const fullName = rawName.includes(':') ? rawName : `${WORKSPACE}:${rawName}`;

                    layers.push({ shortName, fullName, label: title });
                });

                console.log(`Discovered ${layers.length} WFS layers`);
                return layers;
            } catch (e) {
                console.error('Failed to discover layers:', e);
                return [];
            } finally {
                hideLoading();
            }
        }

        // ---- FETCH GEOJSON FOR A SINGLE LAYER ----
        async function fetchLayerGeoJSON(fullName) {
            const url = `${WFS_URL}?service=WFS&version=1.0.0&request=GetFeature&typeName=${encodeURIComponent(fullName)}&outputFormat=application/json&srsName=EPSG:4326`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`WFS request failed: ${resp.status}`);
            return await resp.json();
        }

        // ---- ADD A LAYER TO THE MAP ----
        function addLayerToMap(shortName) {
            const info = layerData[shortName];
            if (!info || !info.leafletLayer) return;

            if (info.clusterGroup) {
                map.addLayer(info.clusterGroup);
            } else {
                map.addLayer(info.leafletLayer);
            }
        }

        // ---- REMOVE A LAYER FROM THE MAP ----
        function removeLayerFromMap(shortName) {
            const info = layerData[shortName];
            if (!info) return;

            if (info.clusterGroup && map.hasLayer(info.clusterGroup)) {
                map.removeLayer(info.clusterGroup);
            } else if (info.leafletLayer && map.hasLayer(info.leafletLayer)) {
                map.removeLayer(info.leafletLayer);
            }
        }

        // ---- BUILD LAYER PANEL ----
        function buildLayerPanel() {
            const container = document.getElementById('layer-list');
            container.innerHTML = '';
            const names = Object.keys(layerData).sort();

            if (names.length === 0) {
                container.innerHTML = '<div class="status-text">No layers found.</div>';
                return;
            }

            names.forEach(name => {
                const info = layerData[name];
                const item = document.createElement('div');
                item.className = 'layer-item';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.id = `chk-${name}`;
                cb.checked = true;
                cb.addEventListener('change', () => {
                    if (cb.checked) addLayerToMap(name);
                    else removeLayerFromMap(name);
                });

                // Color/symbol swatch
                const swatch = document.createElement('div');
                swatch.className = 'layer-swatch';
                swatch.id = `swatch-${name}`;
                swatch.innerHTML = createSwatchSVG(info.geomType, info.color, info.pointSymbol);

                const label = document.createElement('label');
                label.htmlFor = `chk-${name}`;
                label.textContent = info.label;

                const count = document.createElement('span');
                count.className = 'layer-count';
                const n = info.geojson ? info.geojson.features.length : 0;
                count.textContent = `(${n})`;

                item.appendChild(cb);
                item.appendChild(swatch);
                item.appendChild(label);
                item.appendChild(count);
                container.appendChild(item);
            });
        }

        // ---- BUILD SYMBOLOGY DROPDOWNS ----
        function buildSymbologyDropdowns() {
            const layerSelect = document.getElementById('sym-layer');
            // Preserve first option
            layerSelect.innerHTML = '<option value="">Select a layer...</option>';
            Object.keys(layerData).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = layerData[name].label;
                layerSelect.appendChild(opt);
            });
        }

        // ---- SYMBOLOGY: Layer selection changed ----
        document.getElementById('sym-layer').addEventListener('change', function() {
            const fieldSelect = document.getElementById('sym-field');
            fieldSelect.innerHTML = '<option value="">Select a field...</option>';
            fieldSelect.disabled = true;

            const styleCtrl = document.getElementById('sym-style-controls');
            const pointRow = document.getElementById('sym-point-row');
            const arrowRow = document.getElementById('sym-arrow-row');

            const name = this.value;
            if (!name || !layerData[name]) {
                styleCtrl.style.display = 'none';
                return;
            }

            const info = layerData[name];
            const fields = info.fields || [];
            if (fields.length === 0) {
                fieldSelect.innerHTML = '<option value="">No fields available</option>';
            } else {
                fields.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.textContent = f;
                    fieldSelect.appendChild(opt);
                });
                fieldSelect.disabled = false;
            }

            // Show style controls matching geometry type
            styleCtrl.style.display = 'block';
            const isPoint = (info.geomType === 'Point' || info.geomType === 'MultiPoint');
            const isLine = (info.geomType === 'LineString' || info.geomType === 'MultiLineString');
            pointRow.style.display = isPoint ? 'flex' : 'none';
            arrowRow.style.display = isLine ? 'flex' : 'none';

            // Sync controls to current layer state
            document.getElementById('sym-point-shape').value = info.pointSymbol || 'circle';
            document.getElementById('sym-arrows').checked = !!info.showArrows;
        });

        // ---- SYMBOLOGY: Field selection changed ----
        document.getElementById('sym-field').addEventListener('change', function() {
            const layerName = document.getElementById('sym-layer').value;
            const field = this.value;
            if (!layerName || !field) return;

            applySymbology(layerName, field);
        });

        // ---- POINT SHAPE: changed ----
        document.getElementById('sym-point-shape').addEventListener('change', function() {
            const layerName = document.getElementById('sym-layer').value;
            if (!layerName || !layerData[layerName]) return;
            changePointSymbol(layerName, this.value);
        });

        // ---- ARROWS: toggled ----
        document.getElementById('sym-arrows').addEventListener('change', function() {
            const layerName = document.getElementById('sym-layer').value;
            if (!layerName || !layerData[layerName]) return;
            toggleArrows(layerName, this.checked);
        });

        // ---- SYMBOLOGY: Reset button ----
        document.getElementById('sym-reset').addEventListener('click', function() {
            const layerName = document.getElementById('sym-layer').value;
            if (!layerName || !layerData[layerName]) return;

            const info = layerData[layerName];

            // Remove arrows if any
            removeArrowDecorators(layerName);
            info.showArrows = false;
            document.getElementById('sym-arrows').checked = false;

            // Reset point symbol to circle
            if (info.pointSymbol && info.pointSymbol !== 'circle') {
                info.pointSymbol = 'circle';
                document.getElementById('sym-point-shape').value = 'circle';
                rebuildLayer(layerName);
            } else {
                resetSymbology(layerName);
            }

            info.symbology = null;
            document.getElementById('sym-field').value = '';
            document.getElementById('legend-content').innerHTML = '<div class="status-text">Apply symbology to see legend</div>';
            activeSymbology = null;
        });

        // ---- CHANGE POINT SYMBOL ----
        function changePointSymbol(layerName, symbolType) {
            const info = layerData[layerName];
            if (!info) return;
            info.pointSymbol = symbolType;
            rebuildLayer(layerName);

            // Re-apply symbology if one was active
            if (info.symbology) {
                applySymbology(layerName, info.symbology.field);
            }

            // Update swatch
            const swatchEl = document.getElementById(`swatch-${layerName}`);
            if (swatchEl && !info.symbology) {
                swatchEl.innerHTML = createSwatchSVG(info.geomType, info.color, symbolType);
            }
        }

        // ---- REBUILD LAYER (remove and recreate from GeoJSON) ----
        function rebuildLayer(layerName) {
            const info = layerData[layerName];
            if (!info) return;

            // Check visibility
            const isVisible = info.clusterGroup
                ? map.hasLayer(info.clusterGroup)
                : map.hasLayer(info.leafletLayer);

            // Remove old
            removeLayerFromMap(layerName);

            // Create new
            const { leafletLayer, clusterGroup, geomType } = createLeafletLayer(
                info.geojson, layerName, info.color, info.pointSymbol
            );
            info.leafletLayer = leafletLayer;
            info.clusterGroup = clusterGroup;

            // Re-add if was visible
            if (isVisible) addLayerToMap(layerName);

            // Rebuild arrows if they were on (for line layers)
            if (info.showArrows) {
                removeArrowDecorators(layerName);
                addArrowDecorators(layerName);
            }
        }

        // ---- ARROW DECORATORS ----
        function toggleArrows(layerName, show) {
            const info = layerData[layerName];
            if (!info) return;
            info.showArrows = show;

            if (show) {
                addArrowDecorators(layerName);
            } else {
                removeArrowDecorators(layerName);
            }
        }

        function addArrowDecorators(layerName) {
            const info = layerData[layerName];
            if (!info || !info.leafletLayer) return;
            if (!info.arrowDecorators) info.arrowDecorators = [];

            info.leafletLayer.eachLayer(function(layer) {
                if (layer.getLatLngs) {
                    const lineColor = (layer.options && layer.options.color) || info.color || '#3388ff';
                    const dec = L.polylineDecorator(layer, {
                        patterns: [{
                            offset: '15%',
                            repeat: '25%',
                            symbol: L.Symbol.arrowHead({
                                pixelSize: 10,
                                polygon: true,
                                pathOptions: {
                                    fillOpacity: 1,
                                    weight: 0,
                                    color: lineColor
                                }
                            })
                        }]
                    });
                    dec.addTo(map);
                    info.arrowDecorators.push(dec);
                }
            });
        }

        function removeArrowDecorators(layerName) {
            const info = layerData[layerName];
            if (!info || !info.arrowDecorators) return;
            info.arrowDecorators.forEach(d => map.removeLayer(d));
            info.arrowDecorators = [];
        }

        // ---- APPLY SYMBOLOGY ----
        function applySymbology(layerName, field) {
            const info = layerData[layerName];
            if (!info || !info.geojson) return;

            // Extract unique values
            const valueCounts = {};
            info.geojson.features.forEach(f => {
                const val = f.properties ? f.properties[field] : null;
                const key = (val === null || val === undefined) ? '(null)' : String(val);
                valueCounts[key] = (valueCounts[key] || 0) + 1;
            });

            // Sort by frequency (most common first)
            const sortedValues = Object.keys(valueCounts).sort((a, b) => valueCounts[b] - valueCounts[a]);

            // Assign colors
            const valueColorMap = {};
            sortedValues.forEach((val, i) => {
                valueColorMap[val] = COLOR_PALETTE[i % COLOR_PALETTE.length];
            });

            activeSymbology = { layerName, field, valueColorMap };
            info.symbology = { field, valueColorMap };

            // Restyle the layer
            const isPoint = (info.geomType === 'Point' || info.geomType === 'MultiPoint');
            const sym = info.pointSymbol || 'circle';

            info.leafletLayer.eachLayer(function(layer) {
                const props = layer.feature.properties || {};
                const val = props[field];
                const key = (val === null || val === undefined) ? '(null)' : String(val);
                const color = valueColorMap[key] || '#888';
                const border = darkenColor(color);

                if (isPoint) {
                    if (sym === 'circle' && layer.setStyle) {
                        // CircleMarker — use setStyle
                        layer.setStyle({ fillColor: color, color: border, fillOpacity: 0.8 });
                    } else if (layer.setIcon) {
                        // DivIcon marker — swap icon SVG
                        const svg = pointSVG(sym, color, border, 14);
                        const icon = L.divIcon({
                            html: svg,
                            className: 'custom-point-icon',
                            iconSize: [14, 14],
                            iconAnchor: [7, 7]
                        });
                        layer.setIcon(icon);
                    }
                } else if (layer.setStyle) {
                    if (info.geomType === 'LineString' || info.geomType === 'MultiLineString') {
                        layer.setStyle({ color: color, weight: 3, opacity: 0.9 });
                    } else {
                        layer.setStyle({ fillColor: color, color: border, weight: 2, fillOpacity: 0.5, opacity: 1 });
                    }
                }
            });

            // Rebuild arrows with new colors if arrows are on
            if (info.showArrows) {
                removeArrowDecorators(layerName);
                addArrowDecorators(layerName);
            }

            // Update legend
            updateLegend(valueColorMap, field, info.geomType, sym);

            // Update layer swatch to show multi-color
            const swatchEl = document.getElementById(`swatch-${layerName}`);
            if (swatchEl) {
                const usedColors = sortedValues.slice(0, 4).map(v => valueColorMap[v]);
                swatchEl.innerHTML = createMultiSwatchSVG(info.geomType, usedColors);
            }
        }

        // ---- RESET SYMBOLOGY TO DEFAULT ----
        function resetSymbology(layerName) {
            const info = layerData[layerName];
            if (!info) return;

            const isPoint = (info.geomType === 'Point' || info.geomType === 'MultiPoint');
            const sym = info.pointSymbol || 'circle';

            if (isPoint && sym !== 'circle') {
                // Rebuild with default color divIcon
                rebuildLayer(layerName);
            } else {
                const style = defaultStyle(info.geomType, info.color);
                info.leafletLayer.eachLayer(function(layer) {
                    if (layer.setStyle) layer.setStyle(style);
                });
            }

            info.symbology = null;

            // Restore layer swatch
            const swatchEl = document.getElementById(`swatch-${layerName}`);
            if (swatchEl) swatchEl.innerHTML = createSwatchSVG(info.geomType, info.color, sym);
        }

        // ---- UPDATE LEGEND ----
        function updateLegend(valueColorMap, fieldName, geomType, symbolType) {
            const container = document.getElementById('legend-content');
            container.innerHTML = '';
            const isPoint = (geomType === 'Point' || geomType === 'MultiPoint');
            const isLine = (geomType === 'LineString' || geomType === 'MultiLineString');

            const header = document.createElement('div');
            header.style.cssText = 'font-size:11px;color:#7f8fa6;margin-bottom:6px;';
            header.textContent = `Field: ${fieldName}`;
            container.appendChild(header);

            Object.entries(valueColorMap).forEach(([val, color]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';

                const swatch = document.createElement('div');
                swatch.className = 'legend-swatch';
                swatch.style.border = 'none';

                if (isPoint) {
                    // Show actual symbol shape in legend
                    swatch.innerHTML = pointSVG(symbolType || 'circle', color, darkenColor(color), 16);
                } else if (isLine) {
                    swatch.style.background = 'transparent';
                    swatch.innerHTML = `<svg width="16" height="16"><line x1="0" y1="8" x2="16" y2="8" stroke="${color}" stroke-width="3" stroke-linecap="round"/></svg>`;
                } else {
                    swatch.style.background = color;
                }

                const label = document.createElement('span');
                label.className = 'legend-label';
                label.textContent = val;
                label.title = val;

                item.appendChild(swatch);
                item.appendChild(label);
                container.appendChild(item);
            });
        }

        // ---- COLOR UTILITY ----
        function darkenColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const factor = 0.6;
            return '#' +
                Math.round(r * factor).toString(16).padStart(2, '0') +
                Math.round(g * factor).toString(16).padStart(2, '0') +
                Math.round(b * factor).toString(16).padStart(2, '0');
        }

        // ---- MAIN INIT ----
        async function init() {
            const layers = await discoverLayers();

            if (layers.length === 0) {
                document.getElementById('layer-list').innerHTML =
                    '<div class="status-text" style="color:#e94560;">No layers found. Is GeoServer running?</div>';
                return;
            }

            // Load all layers in parallel
            const bounds = L.latLngBounds();
            let hasFeatures = false;

            await Promise.all(layers.map(async (layer) => {
                showLoading(`Loading ${layer.label}...`);
                try {
                    const geojson = await fetchLayerGeoJSON(layer.fullName);
                    if (!geojson.features || geojson.features.length === 0) {
                        console.log(`Layer ${layer.shortName}: no features`);
                        hideLoading();
                        return;
                    }

                    const color = LAYER_COLORS[layerIndex % LAYER_COLORS.length];
                    layerIndex++;
                    const { leafletLayer, clusterGroup, geomType } = createLeafletLayer(geojson, layer.shortName, color);
                    const fields = extractFields(geojson);

                    layerData[layer.shortName] = {
                        fullName: layer.fullName,
                        label: layer.label,
                        geojson: geojson,
                        leafletLayer: leafletLayer,
                        clusterGroup: clusterGroup,
                        fields: fields,
                        geomType: geomType,
                        color: color,
                        pointSymbol: 'circle',
                        showArrows: false,
                        arrowDecorators: [],
                        symbology: null
                    };

                    // Add to map
                    addLayerToMap(layer.shortName);

                    // Extend bounds
                    const layerBounds = (clusterGroup || leafletLayer).getBounds();
                    if (layerBounds.isValid()) {
                        bounds.extend(layerBounds);
                        hasFeatures = true;
                    }

                    console.log(`Loaded ${layer.shortName}: ${geojson.features.length} features (${geomType})`);
                } catch (e) {
                    console.error(`Failed to load layer ${layer.shortName}:`, e);
                } finally {
                    hideLoading();
                }
            }));

            // Fit map to all features
            if (hasFeatures && bounds.isValid()) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }

            // Build UI
            buildLayerPanel();
            buildSymbologyDropdowns();

            console.log(`Map ready with ${Object.keys(layerData).length} layers`);
        }

        // ---- GO ----
        init();
    })();
    </script>
